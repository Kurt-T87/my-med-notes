name: PubMed Sync
on:
  schedule:
    - cron: '0 0 * * 1' # 每周一北京时间上午 8 点左右运行
  workflow_dispatch:   # 允许你在 GitHub 页面上手动点击运行

jobs:
  run-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install biopython
      - name: Run Script
        run: python pubmed_to_obsidian.py
      - name: Commit and Push
        run: |
          git config --global user.name "PubMed Bot"
          git config --global user.email "bot@github.com"
          git add Papers/
          git commit -m "New papers found" || echo "No changes"
          git push
